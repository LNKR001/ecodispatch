# =============================================================================
# State-Wide EcoDispatch — Application Configuration
# 1M1B AI for Sustainability Internship Project
# =============================================================================

# ── Server ────────────────────────────────────────────────────────────────────
server.port=8080

# ── Encoding — forces UTF-8 on HTTP responses ────────────────────────────────
# Note: the JVM itself must also be started with -Dfile.encoding=UTF-8
# (added to the Maven launch command) for log output to render correctly.
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# ── Application Info ──────────────────────────────────────────────────────────
spring.application.name=ecodispatch

# ── H2 In-Memory Database (Local Testing) ────────────────────────────────────
spring.datasource.url=jdbc:h2:mem:ecodispatchdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ── JPA / Hibernate ───────────────────────────────────────────────────────────
# create-drop: auto-creates the schema on startup, drops on shutdown
# BUG 1 FIX: removed explicit H2Dialect — Hibernate 6 auto-detects it, and
#            specifying it manually triggers a deprecation WARN on every boot.
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# BUG 2 FIX: silence the open-in-view INFO/WARN — we have no view rendering
#            layer so keeping it enabled is pointless noise.
spring.jpa.open-in-view=false

# ── H2 Console (Accessible at http://localhost:8080/h2-console) ───────────────
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ── Scheduling (Enables @Scheduled annotations) ──────────────────────────────
spring.task.scheduling.pool.size=2

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.com.ecodispatch=DEBUG
logging.level.org.springframework.web=INFO
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n

# =============================================================================
# IBM watsonx.ai Configuration
# Replace the placeholder values below with your actual credentials before
# running against the live IBM watsonx.ai endpoint.
# NEVER commit real API keys to version control — use environment variables
# or a secrets manager in production (e.g. IBM Secrets Manager).
# =============================================================================

# Your IBM Cloud IAM API Key
ibm.watsonx.api-key=YOUR_IBM_CLOUD_API_KEY_HERE

# The watsonx.ai Project ID found in your IBM watsonx.ai project settings
ibm.watsonx.project-id=YOUR_WATSONX_PROJECT_ID_HERE

# IBM Granite model identifier
ibm.watsonx.model-id=ibm/granite-3-0-8b-instruct

# The generation REST endpoint for your IBM Cloud region
# Dallas (us-south) — change region slug if needed
ibm.watsonx.url=https://us-south.ml.cloud.ibm.com/ml/v1/text/generation?version=2023-05-29

# IAM token endpoint used to exchange the API key for a Bearer token
ibm.watsonx.iam-url=https://iam.cloud.ibm.com/identity/token

# Generation parameters
ibm.watsonx.max-new-tokens=300
ibm.watsonx.decoding-method=greedy
