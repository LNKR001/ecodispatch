<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EcoDispatch — State-Wide Heat Anomaly Command Centre</title>

  <!-- Leaflet.js CSS — served locally, no CDN dependency -->
  <link rel="stylesheet" href="/leaflet.css" />

  <style>
    /* ── Global Reset ───────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, "Segoe UI", system-ui, sans-serif;
      background: #0d1117;
      color: #e6edf3;
      min-height: 100vh;
    }

    /* ── Top Navigation Bar ─────────────────────────────────────────────── */
    .topbar {
      background: #161b22;
      border-bottom: 1px solid #30363d;
      padding: 0 24px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 1000;
    }
    .topbar-brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .brand-icon {
      width: 28px;
      height: 28px;
    }
    .brand-name {
      font-size: 15px;
      font-weight: 700;
      color: #3fb950;
      letter-spacing: .03em;
    }
    .brand-sub {
      font-size: 11px;
      color: #8b949e;
      margin-left: 2px;
    }
    .topbar-meta {
      display: flex;
      align-items: center;
      gap: 16px;
      font-size: 12px;
      color: #8b949e;
    }
    .pulse-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #3fb950;
      animation: pulse-green 2s infinite;
    }
    @keyframes pulse-green {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: .5; transform: scale(1.3); }
    }
    .badge-sdg {
      background: #1f6feb22;
      border: 1px solid #1f6feb66;
      color: #79c0ff;
      font-size: 10px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 12px;
      letter-spacing: .04em;
      text-transform: uppercase;
    }

    /* ── Main Layout ────────────────────────────────────────────────────── */
    .main-grid {
      display: grid;
      grid-template-columns: 320px 1fr;
      height: calc(100vh - 56px);
    }

    /* ── Sidebar ────────────────────────────────────────────────────────── */
    .sidebar {
      background: #161b22;
      border-right: 1px solid #30363d;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .sidebar-header {
      padding: 16px 20px 12px;
      border-bottom: 1px solid #30363d;
    }
    .sidebar-title {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: #8b949e;
      margin-bottom: 10px;
    }
    .stat-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
    }
    .stat-box {
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 8px 10px;
      text-align: center;
    }
    .stat-num {
      font-size: 20px;
      font-weight: 700;
      line-height: 1;
    }
    .stat-num.critical { color: #f85149; }
    .stat-num.elevated { color: #e3b341; }
    .stat-num.normal   { color: #3fb950; }
    .stat-label { font-size: 10px; color: #8b949e; margin-top: 3px; }

    /* ── Alert Feed ─────────────────────────────────────────────────────── */
    .alert-feed {
      flex: 1;
      overflow-y: auto;
      padding: 12px 16px;
    }
    .alert-feed::-webkit-scrollbar { width: 4px; }
    .alert-feed::-webkit-scrollbar-track { background: transparent; }
    .alert-feed::-webkit-scrollbar-thumb { background: #30363d; border-radius: 2px; }

    .alert-card {
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 12px 14px;
      margin-bottom: 10px;
      cursor: pointer;
      transition: border-color .15s, background .15s;
    }
    .alert-card:hover {
      border-color: #f8514988;
      background: #f8514908;
    }
    .alert-card.critical { border-left: 3px solid #f85149; }
    .alert-card.elevated { border-left: 3px solid #e3b341; }
    .card-zone {
      font-size: 13px;
      font-weight: 600;
      color: #e6edf3;
      margin-bottom: 2px;
    }
    .card-district {
      font-size: 11px;
      color: #8b949e;
      margin-bottom: 6px;
    }
    .card-temp {
      font-size: 11px;
      font-weight: 600;
    }
    .card-temp.critical { color: #f85149; }
    .card-temp.elevated { color: #e3b341; }
    .card-plan {
      font-size: 11px;
      color: #8b949e;
      margin-top: 6px;
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .sidebar-footer {
      padding: 10px 20px;
      border-top: 1px solid #30363d;
      font-size: 10.5px;
      color: #484f58;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    #last-updated { color: #8b949e; }

    /* ── Map Panel ──────────────────────────────────────────────────────── */
    #map {
      width: 100%;
      height: 100%;
      background: #0d1117;
    }

    /* ── Leaflet custom popup ───────────────────────────────────────────── */
    .leaflet-popup-content-wrapper {
      background: #161b22 !important;
      border: 1px solid #30363d !important;
      border-radius: 8px !important;
      box-shadow: 0 8px 24px rgba(0,0,0,.6) !important;
      max-width: 280px;
    }
    .leaflet-popup-tip { background: #161b22 !important; }
    .leaflet-popup-content { margin: 0 !important; padding: 0 !important; }

    .popup-inner { padding: 14px 16px; }
    .popup-severity {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .07em;
      margin-bottom: 5px;
    }
    .popup-severity.critical { color: #f85149; }
    .popup-severity.elevated { color: #e3b341; }
    .popup-zone {
      font-size: 14px;
      font-weight: 700;
      color: #e6edf3;
      margin-bottom: 2px;
    }
    .popup-district { font-size: 11px; color: #8b949e; margin-bottom: 10px; }
    .popup-metrics {
      display: flex;
      gap: 16px;
      margin-bottom: 10px;
    }
    .popup-metric { font-size: 11px; color: #8b949e; }
    .popup-metric span {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #e6edf3;
    }
    .popup-divider {
      border: none;
      border-top: 1px solid #30363d;
      margin: 8px 0;
    }
    .popup-ai-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: #3fb950;
      margin-bottom: 5px;
    }
    .popup-ai-text { font-size: 12px; color: #c9d1d9; line-height: 1.5; }

    /* ── Blinking hazard marker ─────────────────────────────────────────── */
    .blink-marker {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #f85149;
      border: 2px solid #ffffff44;
      animation: blink-pulse 1.4s infinite;
      position: relative;
    }
    .blink-marker::after {
      content: "";
      position: absolute;
      top: -6px; left: -6px;
      width: 28px; height: 28px;
      border-radius: 50%;
      background: #f8514930;
      animation: ring-expand 1.4s infinite;
    }
    @keyframes blink-pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: .7; transform: scale(1.1); }
    }
    @keyframes ring-expand {
      0%   { transform: scale(.6); opacity: .8; }
      100% { transform: scale(1.6); opacity: 0; }
    }
    .blink-marker.elevated {
      background: #e3b341;
    }
    .blink-marker.elevated::after {
      background: #e3b34130;
    }

    /* ── Empty state ────────────────────────────────────────────────────── */
    .empty-feed {
      text-align: center;
      padding: 32px 16px;
      color: #484f58;
      font-size: 13px;
    }
    .empty-feed-title {
      color: #3fb950;
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 6px;
    }

    /* ── Loading overlay ────────────────────────────────────────────────── */
    #loading-overlay {
      position: fixed;
      inset: 0;
      background: #0d1117;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      transition: opacity .4s;
    }
    #loading-overlay.hidden { opacity: 0; pointer-events: none; }
    .loader-ring {
      width: 44px; height: 44px;
      border: 3px solid #30363d;
      border-top-color: #3fb950;
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loader-text { font-size: 13px; color: #8b949e; }

    /* ── Responsive ─────────────────────────────────────────────────────── */
    @media (max-width: 768px) {
      .main-grid { grid-template-columns: 1fr; grid-template-rows: 260px 1fr; }
      .sidebar { border-right: none; border-bottom: 1px solid #30363d; }
    }
  </style>
</head>

<body>

<!-- ── Loading Overlay ─────────────────────────────────────────────────────── -->
<div id="loading-overlay">
  <div class="loader-ring"></div>
  <div class="loader-text">Connecting to EcoDispatch Granite Agent…</div>
</div>

<!-- ── Top Navigation ──────────────────────────────────────────────────────── -->
<nav class="topbar">
  <div class="topbar-brand">
    <!-- Leaf SVG icon -->
    <svg class="brand-icon" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="14" cy="14" r="14" fill="#1a3a2a"/>
      <path d="M8 20 C8 20 10 10 20 8 C20 8 14 16 8 20Z" fill="#3fb950"/>
      <line x1="8" y1="20" x2="15" y2="13" stroke="#3fb950" stroke-width="1.2" stroke-linecap="round"/>
    </svg>
    <div>
      <span class="brand-name">EcoDispatch</span>
      <span class="brand-sub">State-Wide Heat Anomaly Command Centre</span>
    </div>
  </div>
  <div class="topbar-meta">
    <span class="badge-sdg">SDG 11 &amp; 13</span>
    <span><span class="pulse-dot"></span>&nbsp;IBM Granite Agent Active</span>
    <span style="color:#484f58;">Tamil Nadu, India</span>
  </div>
</nav>

<!-- ── Main Grid ───────────────────────────────────────────────────────────── -->
<div class="main-grid">

  <!-- ── Sidebar ────────────────────────────────────────────────────────────── -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-title">System Status</div>
      <div class="stat-row">
        <div class="stat-box">
          <div class="stat-num critical" id="count-critical">0</div>
          <div class="stat-label">Critical</div>
        </div>
        <div class="stat-box">
          <div class="stat-num elevated" id="count-elevated">0</div>
          <div class="stat-label">Elevated</div>
        </div>
        <div class="stat-box">
          <div class="stat-num normal" id="count-normal">0</div>
          <div class="stat-label">Normal</div>
        </div>
      </div>
    </div>

    <div class="sidebar-title" style="padding: 14px 20px 0; font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.08em; color:#8b949e;">
      Active Dispatch Queue
    </div>
    <div class="alert-feed" id="alert-feed">
      <div class="empty-feed">
        <div class="empty-feed-title">All Clear</div>
        Awaiting first Granite agent scan cycle…
      </div>
    </div>

    <div class="sidebar-footer">
      <span>Auto-refresh: 15s</span>
      <span id="last-updated">—</span>
    </div>
  </aside>

  <!-- ── Map ────────────────────────────────────────────────────────────────── -->
  <main>
    <div id="map"></div>
  </main>

</div><!-- /main-grid -->

<!-- ── Leaflet.js — served locally, no CDN dependency ─────────────────────── -->
<script src="/leaflet.js"></script>

<script>
  // ═══════════════════════════════════════════════════════════════════════════
  //  EcoDispatch — Leaflet.js Dashboard Controller
  //  Polls /api/alerts every 15 seconds and renders blinking hazard markers.
  // ═══════════════════════════════════════════════════════════════════════════

  const API_ENDPOINT   = '/api/alerts';
  const POLL_INTERVAL  = 15_000;      // milliseconds — mirrors @Scheduled rate

  // Active Leaflet marker registry (keyed by alert ID)
  const markerRegistry = {};

  // ── Initialise Leaflet map centred on Tamil Nadu ──────────────────────────
  const map = L.map('map', {
    center:    [11.1271, 78.6569],   // Geographic centre of Tamil Nadu
    zoom:      7,
    zoomControl: true,
    attributionControl: true
  });

  // Dark-themed tile layer (CartoDB Dark Matter)
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/">CARTO</a>',
    subdomains: 'abcd',
    maxZoom: 19
  }).addTo(map);

  // ── Custom Divicon factory for blinking hazard markers ────────────────────
  function createHazardIcon(severity) {
    const cls = severity === 'critical' ? 'blink-marker critical' : 'blink-marker elevated';
    return L.divIcon({
      className: '',
      html: `<div class="${cls}"></div>`,
      iconSize:   [16, 16],
      iconAnchor: [8, 8],
      popupAnchor:[0, -12]
    });
  }

  // ── Build popup HTML from an alert object ─────────────────────────────────
  function buildPopupHtml(alert) {
    const isCritical = alert.temperature > 40.0;
    const sevClass   = isCritical ? 'critical' : 'elevated';
    const sevLabel   = isCritical ? 'Critical Anomaly' : 'Elevated Alert';

    return `
      <div class="popup-inner">
        <div class="popup-severity ${sevClass}">${sevLabel}</div>
        <div class="popup-zone">${alert.zoneName}</div>
        <div class="popup-district">${alert.districtName} District</div>
        <div class="popup-metrics">
          <div class="popup-metric">
            Temperature
            <span style="color:${isCritical ? '#f85149' : '#e3b341'}">
              ${alert.temperature.toFixed(1)}°C
            </span>
          </div>
          <div class="popup-metric">
            Canopy Cover
            <span>${alert.canopyPercentage.toFixed(1)}%</span>
          </div>
        </div>
        <hr class="popup-divider"/>
        <div class="popup-ai-label">Granite AI Dispatch</div>
        <div class="popup-ai-text">${alert.aiActionPlan || 'Generating dispatch instructions…'}</div>
      </div>`;
  }

  // ── Build a sidebar alert card ────────────────────────────────────────────
  function buildAlertCard(alert) {
    const isCritical = alert.temperature > 40.0;
    const sevClass   = isCritical ? 'critical' : 'elevated';

    const card = document.createElement('div');
    card.className = `alert-card ${sevClass}`;
    card.dataset.alertId = alert.id;
    card.innerHTML = `
      <div class="card-zone">${alert.zoneName}</div>
      <div class="card-district">${alert.districtName} District</div>
      <div class="card-temp ${sevClass}">
        ${alert.temperature.toFixed(1)}°C &nbsp;|&nbsp; Canopy: ${alert.canopyPercentage.toFixed(1)}%
      </div>
      <div class="card-plan">${alert.aiActionPlan || ''}</div>`;

    // Clicking a sidebar card flies the map to that marker
    card.addEventListener('click', () => {
      if (markerRegistry[alert.id]) {
        map.flyTo([alert.latitude, alert.longitude], 13, { duration: 1 });
        markerRegistry[alert.id].openPopup();
      }
    });

    return card;
  }

  // ── Main fetch + render cycle ─────────────────────────────────────────────
  async function fetchAndRender() {
    try {
      const response = await fetch(API_ENDPOINT);
      if (!response.ok) throw new Error(`HTTP ${response.status}`);
      const alerts = await response.json();

      // ── Track which IDs are still active ──────────────────────────────────
      const activeIds = new Set(alerts.map(a => a.id));

      // Remove markers/cards for resolved zones
      for (const id of Object.keys(markerRegistry)) {
        if (!activeIds.has(parseInt(id))) {
          map.removeLayer(markerRegistry[id]);
          delete markerRegistry[id];
        }
      }

      // Rebuild sidebar feed
      const feed = document.getElementById('alert-feed');
      feed.innerHTML = '';

      if (alerts.length === 0) {
        feed.innerHTML = `
          <div class="empty-feed">
            <div class="empty-feed-title">All Clear</div>
            No active anomalies detected. Next scan in 15 seconds.
          </div>`;
      } else {
        // Sort: critical first
        alerts.sort((a, b) => b.temperature - a.temperature);

        let critCount = 0, elevCount = 0;

        for (const alert of alerts) {
          // BUG 3 FRONTEND FIX: ELEVATED_ALERT is now a distinct status;
          // treat anything that isn't NORMAL as either critical or elevated.
          const isCritical = alert.status === 'ALERT_PENDING_WATERING';
          if (isCritical) critCount++; else elevCount++;

          // ── Add or update map marker ───────────────────────────────────────
          const latlng   = [alert.latitude, alert.longitude];
          const icon     = createHazardIcon(isCritical ? 'critical' : 'elevated');
          const popupHtml = buildPopupHtml(alert);

          if (markerRegistry[alert.id]) {
            markerRegistry[alert.id]
              .setLatLng(latlng)
              .setIcon(icon)
              .setPopupContent(popupHtml);
          } else {
            const marker = L.marker(latlng, { icon })
              .addTo(map)
              .bindPopup(popupHtml, { maxWidth: 300 });
            markerRegistry[alert.id] = marker;
          }

          // ── Add sidebar card ───────────────────────────────────────────────
          feed.appendChild(buildAlertCard(alert));
        }

        // Update status counters
        document.getElementById('count-critical').textContent = critCount;
        document.getElementById('count-elevated').textContent = elevCount;
      }

      // ── Last updated timestamp ─────────────────────────────────────────────
      const now = new Date();
      document.getElementById('last-updated').textContent =
        `Updated ${now.getHours().toString().padStart(2,'0')}:` +
        `${now.getMinutes().toString().padStart(2,'0')}:` +
        `${now.getSeconds().toString().padStart(2,'0')}`;

    } catch (err) {
      console.error('[EcoDispatch] Fetch error:', err);
      document.getElementById('last-updated').textContent = 'Connection error';
    }
  }

  // ── Bootstrap: fetch immediately, then poll ───────────────────────────────
  window.addEventListener('DOMContentLoaded', async () => {
    // No artificial delay — server is already running when the page loads.
    // Overlay is always dismissed in finally, even on fetch error.
    try {
      await fetchAndRender();
    } finally {
      document.getElementById('loading-overlay').classList.add('hidden');
    }

    // Fetch all zones to update the normal zone counter
    // BUG 7 FIX: removed the unused `activeSet` variable that was declared here
    // but never referenced anywhere.
    try {
      const allResp = await fetch('/api/alerts/all');
      const allAlerts = await allResp.json();
      const normalCount = allAlerts.filter(a => a.status === 'NORMAL').length;
      document.getElementById('count-normal').textContent = normalCount;
    } catch (_) {}

    // Start polling loop
    setInterval(async () => {
      await fetchAndRender();
      // Refresh normal count
      try {
        const allResp = await fetch('/api/alerts/all');
        const allAlerts = await allResp.json();
        const normalCount = allAlerts.filter(a => a.status === 'NORMAL').length;
        document.getElementById('count-normal').textContent = normalCount;
      } catch (_) {}
    }, POLL_INTERVAL);
  });
</script>
</body>
</html>
